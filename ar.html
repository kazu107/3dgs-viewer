<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="3D Gaussian Splattingシーンをマーカーに固定してスマホARで表示" />
  <title>3DGS AR ビューア</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='40%25' cy='35%25'%3E%3Cstop offset='0%25' stop-color='%2367e8f9'/%3E%3Cstop offset='100%25' stop-color='%236366f1'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='13' fill='url(%23g)'/%3E%3C/svg%3E" />
  <script type="module" src="/src/ar.js"></script>
</head>
<body>
  <div id="ar-root"></div>

  <!-- 開始画面(iOSはユーザー操作起点でカメラ許可が必要) -->
  <div id="ar-start" class="ar-overlay">
    <div class="ar-card">
      <div class="ar-brand"><span class="ar-brand-mark"></span>3DGS AR</div>
      <h1 id="ar-scene-name">シーンを読み込み中...</h1>
      <p class="ar-lead">印刷したマーカーにシーンを固定して表示します。カメラの使用を許可してください。</p>

      <div class="ar-field">
        <label for="ar-marker-select">マーカーの種類</label>
        <select id="ar-marker-select" class="ar-input">
          <option value="hiro">Hiro マーカー(標準・おすすめ)</option>
          <option value="barcode">バーコード(QR風マトリクス)マーカー</option>
        </select>
      </div>
      <div class="ar-field hidden" id="ar-barcode-field">
        <label for="ar-barcode-value">バーコード番号</label>
        <input type="number" id="ar-barcode-value" class="ar-input" value="5" min="0" max="63" />
      </div>

      <button id="ar-start-btn" class="ar-primary" disabled>読み込み中...</button>
      <button id="ar-print-btn" class="ar-secondary">マーカーを表示 / 印刷</button>
      <a id="ar-back" class="ar-back" href="/">← 通常ビューアに戻る</a>
      <p class="ar-note" id="ar-support-note"></p>
    </div>
  </div>

  <!-- AR実行中のHUD -->
  <div id="ar-hud" class="hidden">
    <div id="ar-status" class="ar-status">マーカーを探しています...</div>
    <div id="ar-controls" class="ar-controls">
      <div class="ar-slider">
        <label>大きさ <output id="ar-scale-out">1.0</output></label>
        <input type="range" id="ar-scale" min="-1.3" max="1.3" step="0.02" value="0" />
      </div>
      <div class="ar-slider">
        <label>高さ <output id="ar-height-out">0.0</output></label>
        <input type="range" id="ar-height" min="-2" max="2" step="0.05" value="0" />
      </div>
      <div class="ar-btn-row">
        <button id="ar-recenter" class="ar-mini">原点に戻す</button>
        <button id="ar-exit" class="ar-mini">終了</button>
      </div>
    </div>
  </div>

  <!-- マーカー表示モーダル -->
  <div id="ar-marker-modal" class="ar-overlay hidden">
    <div class="ar-card">
      <h1>マーカー</h1>
      <p class="ar-lead" id="ar-marker-desc"></p>
      <div id="ar-marker-view" class="ar-marker-view"></div>
      <p class="ar-note">この四角形全体をカメラに写してください。紙に印刷するか、別の画面に表示してスマホのカメラを向けます。白い余白を含めて平らに置くと安定します。</p>
      <button id="ar-marker-close" class="ar-primary">閉じる</button>
      <a id="ar-marker-official" class="ar-back" target="_blank" rel="noopener">公式マーカー画像を開く</a>
    </div>
  </div>

  <div id="ar-error" class="ar-overlay hidden">
    <div class="ar-card">
      <h1>エラー</h1>
      <p class="ar-lead" id="ar-error-msg"></p>
      <button class="ar-primary" onclick="location.reload()">再読み込み</button>
      <a class="ar-back" href="/">← 通常ビューアに戻る</a>
    </div>
  </div>
</body>
</html>
